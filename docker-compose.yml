version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: techstore_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: techstore
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

  adminer:
    image: adminer
    container_name: techstore_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: techstore_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - DATABASE_URL=mysql://root:root@mysql:3306/techstore
      - PORT=5000
      - JWT_SECRET=techstore_jwt_secret_2026
      - FRONTEND_URL=http://localhost:3000
      - SMTP_HOST=smtp.gmail.com # Keep it for double reference or replace
      - EMAIL_HOST=smtp.gmail.com
      - EMAIL_PORT=587
      - EMAIL_USER=your_email@gmail.com
      - EMAIL_PASS=your_gmail_app_password
    depends_on:
      - mysql

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:5000
        - NEXT_PUBLIC_SOCKET_URL=http://localhost:5000
    container_name: techstore_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - backend

volumes:
  mysqldata:
